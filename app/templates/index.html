{% extends "base.html" %}
{% block title %}StartLab Dashboard{% endblock %}
{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-white font-display">Monitores de Evaluacion</h1>
    <div class="gold-line w-24 mt-2"></div>
    <p class="text-sm text-gray-500 mt-3">Cada monitor vigila un Google Sheet y evalua automaticamente nuevas respuestas.</p>
</div>

<div id="monitors-list" hx-get="/api/monitors" hx-trigger="load" hx-swap="innerHTML">
    <div class="text-center py-12 text-gray-500">
        <div class="htmx-indicator">Cargando monitores...</div>
    </div>
</div>

<script>
document.body.addEventListener('htmx:afterRequest', function(evt) {
    if (evt.detail.target.id === 'monitors-list') {
        const data = JSON.parse(evt.detail.xhr.responseText);
        const container = evt.detail.target;

        if (data.length === 0) {
            container.innerHTML = `
                <div class="text-center py-16 bg-midnight-card rounded-lg border-2 border-dashed border-midnight-border">
                    <p class="text-gray-500 mb-4">No hay monitores configurados</p>
                    <a href="/monitors/new" class="bg-gold text-midnight font-semibold px-4 py-2 rounded-md hover:bg-gold-dark transition-colors">Crear primer monitor</a>
                </div>`;
            return;
        }

        let html = '<div class="grid gap-4">';
        data.forEach(m => {
            const statusColors = {
                active: 'bg-green-900/40 text-green-400 border border-green-800',
                paused: 'bg-midnight-card text-gray-400 border border-midnight-border',
                error: 'bg-red-900/40 text-red-400 border border-red-800'
            };
            const statusColor = statusColors[m.status] || statusColors.paused;
            const counts = m.counts || {};
            const cost = parseFloat(m.total_cost_usd || 0).toFixed(2);

            html += `
            <a href="/monitors/${m.id}" class="block bg-midnight-card rounded-lg border border-midnight-border p-5 hover:border-gold/50 hover:shadow-lg hover:shadow-gold/5 transition-all">
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="font-semibold text-white font-display">${m.sheet_title || 'Sin titulo'}</h3>
                        <p class="text-xs text-gray-600 mt-0.5 font-mono">${m.sheet_id}</p>
                    </div>
                    <span class="text-xs font-medium px-2.5 py-0.5 rounded-full ${statusColor}">${m.status}</span>
                </div>
                <div class="gold-line w-full mt-3 opacity-20"></div>
                <div class="mt-3 flex items-center space-x-6 text-sm">
                    <span class="text-gray-400">Total: ${counts.total || 0}</span>
                    <span class="text-green-400">Completados: ${counts.completed || 0}</span>
                    <span class="text-gold">Pendientes: ${counts.pending || 0}</span>
                    <span class="text-red-400">Errores: ${counts.error || 0}</span>
                    <span class="text-gray-600">Costo: $${cost}</span>
                </div>
            </a>`;
        });
        html += '</div>';
        container.innerHTML = html;
    }
});
</script>
{% endblock %}
