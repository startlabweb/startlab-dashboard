{% extends "base.html" %}
{% block title %}Monitor — StartLab{% endblock %}
{% block content %}
<div id="monitor-page" data-monitor-id="{{ monitor_id }}">
    <!-- Header -->
    <div class="flex justify-between items-center mb-2" id="monitor-header">
        <div>
            <h1 class="text-2xl font-bold text-white font-display" id="monitor-title">Cargando...</h1>
            <div class="gold-line w-20 mt-1"></div>
            <p class="text-xs text-gray-600 font-mono mt-2" id="monitor-sheet-id"></p>
        </div>
        <div class="flex items-center space-x-3">
            <span id="cost-badge" class="text-sm text-gold"></span>
            <span id="status-badge" class="text-xs font-medium px-2.5 py-0.5 rounded-full"></span>
            <button id="toggle-btn" onclick="toggleMonitor()" class="px-4 py-2 rounded-md text-sm font-semibold transition-colors"></button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="border-b border-midnight-border mb-4 mt-6">
        <nav class="flex space-x-8">
            <button onclick="showTab('candidates')" class="tab-btn border-b-2 border-gold text-gold pb-3 text-sm font-medium" data-tab="candidates">Candidatos</button>
            <button onclick="showTab('activity')" class="tab-btn border-b-2 border-transparent text-gray-500 pb-3 text-sm font-medium hover:text-gray-300 transition-colors" data-tab="activity">Actividad</button>
            <button onclick="showTab('stats')" class="tab-btn border-b-2 border-transparent text-gray-500 pb-3 text-sm font-medium hover:text-gray-300 transition-colors" data-tab="stats">Estadisticas</button>
        </nav>
    </div>

    <!-- Tab: Candidates -->
    <div id="tab-candidates" class="tab-content">
        <div class="bg-midnight-card rounded-lg border border-midnight-border overflow-hidden">
            <table class="min-w-full divide-y divide-midnight-border">
                <thead class="bg-midnight-light">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gold/70 uppercase tracking-wider">Fila</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gold/70 uppercase tracking-wider">Nombre</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gold/70 uppercase tracking-wider">Email</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gold/70 uppercase tracking-wider">Escritas</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gold/70 uppercase tracking-wider">Video</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gold/70 uppercase tracking-wider">Status</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gold/70 uppercase tracking-wider">Acciones</th>
                    </tr>
                </thead>
                <tbody id="candidates-body" class="divide-y divide-midnight-border/50">
                    <tr><td colspan="7" class="px-4 py-8 text-center text-gray-600">Cargando candidatos...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Tab: Activity -->
    <div id="tab-activity" class="tab-content hidden">
        <div class="bg-midnight-card rounded-lg border border-midnight-border p-4">
            <div id="activity-feed" class="space-y-2 max-h-96 overflow-y-auto font-mono text-xs"></div>
        </div>
    </div>

    <!-- Tab: Stats -->
    <div id="tab-stats" class="tab-content hidden">
        <div class="grid grid-cols-4 gap-4" id="stats-grid">
            <div class="bg-midnight-card rounded-lg border border-midnight-border p-4">
                <p class="text-xs text-gray-500">Total</p>
                <p class="text-2xl font-bold text-white font-display" id="stat-total">—</p>
            </div>
            <div class="bg-midnight-card rounded-lg border border-midnight-border p-4">
                <p class="text-xs text-gray-500">Completados</p>
                <p class="text-2xl font-bold text-green-400 font-display" id="stat-completed">—</p>
            </div>
            <div class="bg-midnight-card rounded-lg border border-midnight-border p-4">
                <p class="text-xs text-gray-500">Pendientes</p>
                <p class="text-2xl font-bold text-gold font-display" id="stat-pending">—</p>
            </div>
            <div class="bg-midnight-card rounded-lg border border-midnight-border p-4">
                <p class="text-xs text-gray-500">Costo Total</p>
                <p class="text-2xl font-bold text-gray-400 font-display" id="stat-cost">—</p>
            </div>
        </div>
    </div>

    <!-- Candidate detail modal -->
    <div id="candidate-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center">
        <div class="bg-midnight-card rounded-lg border border-midnight-border max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-white font-display" id="modal-title"></h3>
                <button onclick="closeModal()" class="text-gray-500 hover:text-gold text-xl transition-colors">&times;</button>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>
</div>

<script>
const monitorId = '{{ monitor_id }}';
let monitorData = null;

async function loadMonitor() {
    const res = await fetch(`/api/monitors/${monitorId}`);
    monitorData = await res.json();
    renderHeader();
    loadCandidates();
    loadActivity();
}

function renderHeader() {
    const m = monitorData;
    document.getElementById('monitor-title').textContent = m.sheet_title || 'Monitor';
    document.getElementById('monitor-sheet-id').textContent = m.sheet_id;
    document.getElementById('cost-badge').textContent = `$${parseFloat(m.total_cost_usd || 0).toFixed(2)}`;

    const badge = document.getElementById('status-badge');
    const btn = document.getElementById('toggle-btn');

    if (m.status === 'active') {
        badge.className = 'text-xs font-medium px-2.5 py-0.5 rounded-full bg-green-900/40 text-green-400 border border-green-800';
        badge.innerHTML = '<span class="inline-block w-2 h-2 rounded-full bg-green-400 mr-1 pulse-dot"></span>Activo';
        btn.textContent = 'Pausar';
        btn.className = 'px-4 py-2 rounded-md text-sm font-semibold bg-midnight-light border border-gold/50 text-gold hover:bg-gold hover:text-midnight transition-colors';
    } else {
        badge.className = 'text-xs font-medium px-2.5 py-0.5 rounded-full bg-midnight-light text-gray-400 border border-midnight-border';
        badge.textContent = 'Pausado';
        btn.textContent = 'Activar';
        btn.className = 'px-4 py-2 rounded-md text-sm font-semibold bg-gold text-midnight hover:bg-gold-dark transition-colors';
    }

    const c = m.counts || {};
    document.getElementById('stat-total').textContent = c.total || 0;
    document.getElementById('stat-completed').textContent = c.completed || 0;
    document.getElementById('stat-pending').textContent = c.pending || 0;
    document.getElementById('stat-cost').textContent = `$${parseFloat(m.total_cost_usd || 0).toFixed(2)}`;
}

async function toggleMonitor() {
    const action = monitorData.status === 'active' ? 'stop' : 'start';
    try {
        const res = await fetch(`/api/monitors/${monitorId}/${action}`, {method: 'POST'});
        if (!res.ok) {
            const data = await res.json();
            alert(data.detail || 'Error');
            return;
        }
        loadMonitor();
    } catch (e) { alert(e.message); }
}

async function loadCandidates() {
    const res = await fetch(`/api/monitors/${monitorId}/candidates`);
    const data = await res.json();
    const tbody = document.getElementById('candidates-body');

    if (!data.candidates || data.candidates.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-600">Sin candidatos aun</td></tr>';
        return;
    }

    const statusPill = (status) => {
        const colors = {
            completed: 'bg-green-900/40 text-green-400 border border-green-800',
            processing: 'bg-blue-900/40 text-blue-400 border border-blue-800',
            pending: 'bg-midnight-light text-gray-500 border border-midnight-border',
            error: 'bg-red-900/40 text-red-400 border border-red-800',
            no_video: 'bg-gold/10 text-gold border border-gold/30',
        };
        return `<span class="text-xs px-2 py-0.5 rounded-full ${colors[status] || colors.pending}">${status}</span>`;
    };

    let html = '';
    data.candidates.forEach(c => {
        const overallStatus = (c.written_status === 'error' || c.video_status === 'error') ? 'error' :
            (c.written_status === 'processing' || c.video_status === 'processing') ? 'processing' :
            (c.written_status === 'completed' && (c.video_status === 'completed' || c.video_status === 'no_video')) ? 'completed' : 'pending';

        const ws = c.written_score != null ? c.written_score : '—';
        const vs = c.video_status === 'no_video' ? 'N/A' : (c.video_score != null ? c.video_score : '—');
        const canRetry = c.written_status === 'error' || c.video_status === 'error';

        html += `<tr class="hover:bg-midnight-light/50 cursor-pointer transition-colors" onclick="showCandidate('${c.id}')">
            <td class="px-4 py-3 text-sm text-gray-500">${c.sheet_row}</td>
            <td class="px-4 py-3 text-sm font-medium text-white">${c.name || '—'}</td>
            <td class="px-4 py-3 text-sm text-gray-500">${c.email || '—'}</td>
            <td class="px-4 py-3 text-sm text-gold">${ws}</td>
            <td class="px-4 py-3 text-sm text-gold">${vs}</td>
            <td class="px-4 py-3">${statusPill(overallStatus)}</td>
            <td class="px-4 py-3">${canRetry ? `<button onclick="event.stopPropagation(); retryCandidate('${c.id}')" class="text-xs text-gold hover:text-gold-light transition-colors">Reintentar</button>` : ''}</td>
        </tr>`;
    });
    tbody.innerHTML = html;
}

async function loadActivity() {
    const feed = document.getElementById('activity-feed');
    if (monitorData && monitorData.status === 'active') {
        const evtSource = new EventSource(`/api/monitors/${monitorId}/events`);
        evtSource.onmessage = function(e) {
            const event = JSON.parse(e.data);
            const time = new Date().toLocaleTimeString('es', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
            const msg = formatEvent(event);
            feed.innerHTML = `<div class="text-gray-400 fade-in">[${time}] ${msg}</div>` + feed.innerHTML;
            loadCandidates();
        };
    }
}

function formatEvent(e) {
    switch(e.type) {
        case 'new_candidate': return `<span class="text-gold">Nueva respuesta: ${e.name} (fila ${e.row})</span>`;
        case 'processing': return `<span class="text-gray-400">Procesando ${e.phase}: ${e.name}...</span>`;
        case 'downloaded': return `<span class="text-gray-400">Video descargado: ${e.name}</span>`;
        case 'transcribed': return `<span class="text-gray-400">Transcripcion completa: ${e.name} (${e.duration}s)</span>`;
        case 'written_complete': return `<span class="text-green-400">Escritas: ${e.name} — ${e.score}/${e.total}</span>`;
        case 'video_complete': return `<span class="text-green-400">Video: ${e.name} — ${e.score}/${e.total} ($${e.cost})</span>`;
        case 'error': return `<span class="text-red-400">Error (${e.phase}): ${e.name} — ${e.error}</span>`;
        default: return JSON.stringify(e);
    }
}

async function showCandidate(id) {
    const res = await fetch(`/api/monitors/${monitorId}/candidates/${id}`);
    const c = await res.json();

    document.getElementById('modal-title').textContent = c.name || 'Candidato';
    let html = `<div class="space-y-4">`;

    // Written
    html += `<div class="border border-midnight-border rounded-md p-3">
        <h4 class="font-medium text-sm text-gold mb-2">Evaluacion Escritas</h4>
        <p class="text-lg font-bold text-white font-display">${c.written_score != null ? c.written_score + ' pts' : 'Pendiente'}</p>
        <p class="text-sm text-gray-400 mt-1">${c.written_explanation || ''}</p>`;
    if (c.written_breakdown) {
        html += '<div class="mt-2 text-xs text-gray-500">';
        Object.entries(c.written_breakdown).forEach(([k, v]) => {
            if (k.includes('reason') || k.includes('razon')) html += `<p class="mt-1">${v}</p>`;
        });
        html += '</div>';
    }
    html += '</div>';

    // Video
    html += `<div class="border border-midnight-border rounded-md p-3">
        <h4 class="font-medium text-sm text-gold mb-2">Evaluacion Video</h4>`;
    if (c.video_status === 'no_video') {
        html += '<p class="text-sm text-gold/70">Sin video</p>';
    } else {
        html += `<p class="text-lg font-bold text-white font-display">${c.video_score != null ? c.video_score + ' pts' : 'Pendiente'}</p>
        <p class="text-sm text-gray-400 mt-1">${c.video_explanation || ''}</p>`;
        if (c.video_breakdown) {
            html += '<div class="mt-2 text-xs text-gray-500">';
            Object.entries(c.video_breakdown).forEach(([k, v]) => {
                if (k.includes('reason') || k.includes('razon')) html += `<p class="mt-1">${v}</p>`;
            });
            html += '</div>';
        }
    }
    html += '</div>';

    // Transcript
    if (c.transcript) {
        html += `<div class="border border-midnight-border rounded-md p-3">
            <h4 class="font-medium text-sm text-gold mb-2">Transcripcion</h4>
            <div class="text-xs text-gray-500 max-h-48 overflow-y-auto whitespace-pre-wrap">${c.transcript}</div>
        </div>`;
    }

    // Error
    if (c.error_message) {
        html += `<div class="bg-wine/20 border border-wine rounded-md p-3">
            <p class="text-sm text-red-400">${c.error_message}</p>
        </div>`;
    }

    html += '</div>';
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('candidate-modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('candidate-modal').classList.add('hidden'); }

async function retryCandidate(id) {
    await fetch(`/api/monitors/${monitorId}/candidates/${id}/retry`, {method: 'POST'});
    loadCandidates();
}

function showTab(name) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(el => {
        el.classList.replace('border-gold', 'border-transparent');
        el.classList.replace('text-gold', 'text-gray-500');
    });
    document.getElementById('tab-' + name).classList.remove('hidden');
    const btn = document.querySelector(`[data-tab="${name}"]`);
    btn.classList.replace('border-transparent', 'border-gold');
    btn.classList.replace('text-gray-500', 'text-gold');
}

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

loadMonitor();
setInterval(loadMonitor, 30000);
</script>
{% endblock %}
